name: Pull Request

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .